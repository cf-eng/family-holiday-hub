{% extends 'base.html' %}{% block content %}<section class="page-head"><div><span class="eyebrow">READY TO GO</span><h1>Packing</h1><p>{{stats.packed}} of {{stats.packing_total}} packed</p></div><div class="ring" style="--p:{{stats.packing_pct}}">{{stats.packing_pct}}%</div></section><section class="panel"><form method="post" class="inline-form"><input type="hidden" name="csrf_token" value="{{csrf_token()}}"><input name="label" placeholder="Add an item" required><input name="owner" placeholder="Owner" value="Everyone"><button class="button">Add</button></form><div class="check-list">{% for x in trip.packing_items %}<form method="post" action="{{url_for('toggle_packing',trip_id=trip.id,item_id=x.id)}}"><input type="hidden" name="csrf_token" value="{{csrf_token()}}"><button class="check-row {{'done' if x.packed}}"><span>{{'✓' if x.packed else '○'}}</span><strong>{{x.label}}</strong><small>{{x.owner}}</small></button></form>{% endfor %}</div></section>{% endblock %}
