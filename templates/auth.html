{% extends 'base.html' %}{% block content %}<section class="auth-card"><span class="eyebrow">WELCOME</span><h1>{{'Create your account' if mode=='register' else 'Welcome back'}}</h1><form method="post"><input type="hidden" name="csrf_token" value="{{csrf_token()}}">{% if mode=='register' %}<label>Name<input name="name" required></label>{% endif %}<label>Email<input type="email" name="email" required></label><label>Password<input type="password" name="password" minlength="10" required></label><button class="button full">{{'Create account' if mode=='register' else 'Log in'}}</button></form></section>{% endblock %}
