{% extends 'base.html' %}{% block content %}<section class="form-shell"><div><span class="eyebrow">NEW ADVENTURE</span><h1>Create a trip</h1><p>The header photo is required and becomes the visual identity of the trip.</p></div><form method="post" class="form-grid"><input type="hidden" name="csrf_token" value="{{csrf_token()}}"><label>Trip name<input name="name" required placeholder="Mallorca 2027"></label><label>Destination<input name="destination" required placeholder="Palma, Mallorca"></label><label class="wide">Header photo URL<input type="url" name="header_url" required placeholder="https://images.unsplash.com/..."></label><label>Start date<input type="date" name="start_date" required></label><label>End date<input type="date" name="end_date" required></label><label>Origin<input name="origin" value="Dublin"></label><label>Budget<input type="number" step="0.01" name="budget"></label><label>Origin latitude<input name="origin_lat" value="53.3498"></label><label>Origin longitude<input name="origin_lng" value="-6.2603"></label><label>Destination latitude<input name="destination_lat" value="39.5696"></label><label>Destination longitude<input name="destination_lng" value="2.6502"></label><button class="button wide">Create holiday hub</button></form></section>{% endblock %}
