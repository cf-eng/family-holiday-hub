{% extends 'base.html' %}{% block content %}<div class="form-shell"><form class="panel form-card" method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><span class="eyebrow">NEW ADVENTURE</span><h1>Create a trip</h1><div class="form-grid"><label>Trip name<input name="name" required placeholder="Mallorca 2027"></label><label>Destination<input name="destination" required placeholder="Palma, Mallorca"></label><label>Start date<input type="date" name="start_date" required></label><label>End date<input type="date" name="end_date" required></label><label>Starting from<input name="origin" value="Dublin"></label><label>Budget (€)<input type="number" step="0.01" name="budget"></label><label class="span-2">Accommodation<input name="accommodation" placeholder="Hotel or apartment"></label><label class="span-2">Header photo URL<input type="url" name="header_url" required placeholder="https://images.unsplash.com/..."><small>Required. Use a wide, high-quality destination photo.</small></label></div><button class="btn">Create trip</button></form></div>{% endblock %}
